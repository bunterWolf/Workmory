name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check if beta release (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == *"beta"* ]]; then
            echo "EP_PRE_RELEASE=true" >> $GITHUB_ENV
          else
            echo "EP_PRE_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Check if beta release (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "*beta*") {
            "EP_PRE_RELEASE=true" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            "EP_PRE_RELEASE=false" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Build application
        run: npm run build

      - name: Create Distribution
        run: npx electron-builder --publish never
        env:
          EP_PRE_RELEASE: ${{ env.EP_PRE_RELEASE }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: |
            release/**/*.exe
            release/**/*.zip
            release/**/*.yml
            release/**/*.blockmap

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check if beta release
        id: check-beta
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == *"beta"* ]]; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/*.exe
            **/*.zip
            **/*.yml
            **/*.blockmap
          draft: false
          prerelease: ${{ steps.check-beta.outputs.is_beta == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
